<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>笔记预览 · 小红书</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #e8eaed;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 24px 16px 40px;
    font-family: 'Noto Sans SC', -apple-system, sans-serif;
  }

  /* ===== 外层弹窗面板 ===== */
  .panel {
    background: #fff;
    border-radius: 16px;
    width: 420px;
    padding: 20px 20px 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .panel-header {
    display: flex; align-items: center; justify-content: space-between;
  }
  .panel-title {
    display: flex; align-items: center; gap: 8px;
    font-size: 17px; font-weight: 700; color: #111;
  }
  .panel-title svg { width: 22px; height: 22px; }
  .close-btn {
    font-size: 22px; color: #555; cursor: pointer;
    line-height: 1; border: none; background: none; padding: 2px 6px;
  }

  /* ===== 手机外壳 ===== */
  .phone-wrap { display: flex; justify-content: center; }

  .phone {
    position: relative;
    width: 280px;
    background: linear-gradient(145deg, #5b9bd5, #3a7fc1, #5b9bd5);
    border-radius: 38px;
    padding: 3px;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.3) inset,
      4px 8px 24px rgba(40,80,140,0.35),
      -2px -2px 8px rgba(255,255,255,0.2);
  }
  .phone::before {
    content: '';
    position: absolute; left: -5px; top: 80px;
    width: 4px; height: 28px;
    background: linear-gradient(145deg, #4a8ec4, #2d6fa8);
    border-radius: 2px 0 0 2px;
    box-shadow: 0 36px 0 #3a7fc1, 0 68px 0 #3a7fc1;
  }
  .phone::after {
    content: '';
    position: absolute; right: -5px; top: 100px;
    width: 4px; height: 50px;
    background: linear-gradient(145deg, #4a8ec4, #2d6fa8);
    border-radius: 0 2px 2px 0;
  }

  .phone-screen {
    background: #fff;
    border-radius: 36px;
    overflow: hidden;
    position: relative;
    height: 560px;
  }

  .notch {
    width: 90px; height: 22px;
    background: #111;
    border-radius: 0 0 14px 14px;
    margin: 0 auto;
    position: relative; z-index: 10;
  }

  /* ===== 页面切换容器 ===== */
  .app-content {
    position: absolute;
    inset: 0;
    top: 22px;
    overflow: hidden;
  }

  .page {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s ease;
  }
  .page.active {
    opacity: 1; pointer-events: all;
  }

  /* ============================================================
     笔记页
  ============================================================ */
  .note-author-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 12px 8px;
    border-bottom: 1px solid #f5f5f5;
    flex-shrink: 0;
  }
  .note-author-info {
    display: flex; align-items: center; gap: 8px;
  }
  .avatar-lg {
    width: 32px; height: 32px; border-radius: 50%;
    background: #e02020;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: #fff; font-weight: 700; flex-shrink: 0;
  }
  .author-name { font-size: 12px; font-weight: 600; color: #111; }
  .follow-btn {
    border: 1.5px solid #ff2442; color: #ff2442;
    background: none; border-radius: 20px;
    padding: 4px 14px; font-size: 11px; font-weight: 500;
    cursor: pointer; font-family: inherit;
  }

  /* 封面大图 */
  .note-cover {
    width: 100%; flex-shrink: 0;
    height: 210px;
    position: relative; overflow: hidden;
  }
  .arch-scene {
    width: 100%; height: 100%;
    background: #c8cdd4;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .arch-outer {
    width: 72px; height: 118px;
    background: #e8e4de;
    border-radius: 36px 36px 0 0;
    display: flex; align-items: flex-end; justify-content: center;
    box-shadow: 2px 2px 10px rgba(0,0,0,0.18);
    position: relative;
    z-index: 2;
  }
  .arch-inner {
    width: 44px; height: 100px;
    background: #4a6840;
    border-radius: 22px 22px 0 0;
    position: absolute; bottom: 0;
  }
  .arch-ball {
    position: absolute; top: 18px; left: 50%;
    transform: translateX(-50%);
    width: 13px; height: 13px;
    background: #f0ece6; border-radius: 50%;
    box-shadow: 0 1px 4px rgba(0,0,0,0.25);
    z-index: 3;
  }
  .plant-deco {
    position: absolute; right: 44px; bottom: 0;
    font-size: 36px; z-index: 3;
  }
  .fence-deco {
    position: absolute; right: 20px; bottom: 0;
    font-size: 22px; z-index: 3; opacity: 0.7;
  }

  /* 图片分页点 */
  .img-dots {
    position: absolute; bottom: 8px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 4px; z-index: 5;
  }
  .img-dot {
    width: 5px; height: 5px;
    border-radius: 50%; background: rgba(255,255,255,0.5);
  }
  .img-dot.cur { background: #fff; width: 14px; border-radius: 3px; }

  /* 笔记内容 */
  .note-body {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 10px 12px;
    scrollbar-width: none;
  }
  .note-body::-webkit-scrollbar { display: none; }

  .note-time {
    font-size: 9px; color: #ccc;
    text-align: center; margin-bottom: 8px;
  }
  .note-divider { height: 1px; background: #f0f0f0; margin-bottom: 10px; }

  .comment-bar {
    display: flex; align-items: center; gap: 8px; padding: 0 2px;
  }
  .comment-avatar {
    width: 24px; height: 24px; border-radius: 50%;
    background: #e02020;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; color: #fff; font-weight: 700; flex-shrink: 0;
  }
  .comment-input {
    flex: 1; background: #f5f5f5;
    border-radius: 20px; padding: 7px 12px;
    font-size: 10px; color: #bbb; font-family: inherit;
  }

  .note-action-bar {
    display: flex; align-items: center; justify-content: space-around;
    padding: 8px 8px 14px;
    border-top: 1px solid #f5f5f5;
    flex-shrink: 0;
  }
  .action-item {
    display: flex; flex-direction: column; align-items: center;
    gap: 2px; font-size: 8px; color: #999; cursor: pointer;
  }
  .action-icon { font-size: 16px; }

  /* ============================================================
     发现页
  ============================================================ */
  .tab-bar {
    display: flex; justify-content: center; gap: 28px;
    padding: 10px 0 8px;
    border-bottom: 1px solid #f0f0f0;
    flex-shrink: 0;
  }
  .tab-bar span { font-size: 13px; color: #999; cursor: pointer; padding-bottom: 4px; }
  .tab-bar span.active { color: #111; font-weight: 700; border-bottom: 2px solid #111; }

  .feed {
    flex: 1; overflow: hidden;
    padding: 6px 6px 0;
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 6px; align-content: start;
  }
  .feed-item {
    background: #f8f8f8; border-radius: 8px;
    overflow: hidden; display: flex; flex-direction: column;
  }
  .cover-placeholder {
    width: 100%; aspect-ratio: 1 / 1.05;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .cover-1 { background: linear-gradient(135deg, #c8c8c8, #e0e0e0); }
  .cover-2 { background: linear-gradient(135deg, #c8a870, #5a4020); }
  .cover-3 { background: linear-gradient(135deg, #d0cfc8, #b8b5aa); }
  .cover-4 { background: linear-gradient(135deg, #c8c0b0, #a09080); }
  .cover-label {
    position: absolute; bottom: 8px; left: 8px; right: 8px;
    font-size: 7px; color: rgba(255,255,255,0.9);
    background: rgba(0,0,0,0.3); border-radius: 3px;
    padding: 2px 4px; text-align: center;
  }
  .feed-info {
    padding: 5px 6px 6px;
    display: flex; flex-direction: column; gap: 5px;
  }
  .feed-title {
    font-size: 10px; font-weight: 500; color: #111; line-height: 1.4;
    display: -webkit-box; -webkit-line-clamp: 2;
    -webkit-box-orient: vertical; overflow: hidden;
  }
  .feed-meta { display: flex; align-items: center; justify-content: space-between; }
  .feed-author { display: flex; align-items: center; gap: 4px; font-size: 9px; color: #888; }
  .avatar {
    width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 7px; color: #fff; font-weight: 700;
  }
  .av-orange { background: #ff4444; }
  .av-pink   { background: #e8739a; }
  .av-red    { background: #e02020; }
  .av-gray   { background: #aaa; }
  .feed-likes { display: flex; align-items: center; gap: 2px; font-size: 9px; color: #888; }
  .heart { font-size: 9px; color: #ccc; }
  .feed-item.no-title .feed-info {
    flex-direction: row; align-items: center;
    justify-content: space-between; padding: 6px;
  }

  /* ===== 底部导航（共用） ===== */
  .bottom-nav {
    display: flex; align-items: center; justify-content: space-around;
    padding: 8px 0 12px;
    border-top: 1px solid #f0f0f0;
    background: #fff; flex-shrink: 0;
  }
  .nav-item {
    display: flex; flex-direction: column; align-items: center;
    gap: 2px; font-size: 10px; color: #999; cursor: pointer;
  }
  .nav-item.active { color: #111; font-weight: 700; }
  .nav-icon { font-size: 16px; }
  .nav-plus {
    width: 28px; height: 22px;
    background: linear-gradient(90deg, #ff6b9d, #ff4757);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 16px; font-weight: 300;
  }

  /* ===== 底部按钮 ===== */
  .panel-footer { display: flex; gap: 12px; }

  .btn {
    flex: 1; padding: 12px 0; border-radius: 10px;
    font-size: 15px; font-weight: 600; cursor: pointer;
    border: 1.5px solid #ddd; background: #fff; color: #333;
    text-align: center; font-family: inherit;
    transition: all 0.18s ease;
  }
  .btn.active-tab {
    background: #3d9bff; border-color: #3d9bff; color: #fff;
    box-shadow: 0 3px 10px rgba(61,155,255,0.35);
  }
  .btn-ghost {
    background: #f5f5f5; border-color: #f5f5f5; color: #888;
    display: flex; align-items: center; justify-content: center;
    gap: 6px; font-size: 13px; font-weight: 400;
  }
</style>
</head>
<body>

<div class="panel">

  <!-- 顶部标题 -->
  <div class="panel-header">
    <div class="panel-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <ellipse cx="12" cy="12" rx="9" ry="6"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
      笔记预览
    </div>
    <button class="close-btn" aria-label="关闭">×</button>
  </div>

  <!-- 手机 mockup -->
  <div class="phone-wrap">
    <div class="phone">
      <div class="phone-screen">
        <div class="notch"></div>

        <div class="app-content">

          <!-- ====== 笔记页 ====== -->
          <div class="page active" id="note-page">

            <div class="note-author-bar">
              <div class="note-author-info">
                <div class="avatar-lg">R</div>
                <span class="author-name">红薯编辑器</span>
              </div>
              <button class="follow-btn">关注</button>
            </div>

            <div class="note-cover">
              <div class="arch-scene">
                <div class="arch-outer">
                  <div class="arch-ball"></div>
                  <div class="arch-inner"></div>
                </div>
                <div class="plant-deco">🌿</div>
                <div class="fence-deco">🔩</div>
              </div>
              <div class="img-dots">
                <div class="img-dot cur"></div>
                <div class="img-dot"></div>
                <div class="img-dot"></div>
              </div>
            </div>

            <div class="note-body">
              <div class="note-time">今天 17:22</div>
              <div class="note-divider"></div>
              <div class="comment-bar">
                <div class="comment-avatar">R</div>
                <div class="comment-input">爱评论的人运气都不差～</div>
              </div>
            </div>

            <div class="note-action-bar">
              <div class="action-item">
                <span class="action-icon">♡</span>
                <span>137</span>
              </div>
              <div class="action-item">
                <span class="action-icon">☆</span>
                <span>收藏</span>
              </div>
              <div class="action-item">
                <span class="action-icon">💬</span>
                <span>评论</span>
              </div>
              <div class="action-item">
                <span class="action-icon">↗</span>
                <span>分享</span>
              </div>
            </div>

          </div><!-- /note-page -->


          <!-- ====== 发现页 ====== -->
          <div class="page" id="discover-page">

            <nav class="tab-bar">
              <span>关注</span>
              <span class="active">发现</span>
              <span>本地</span>
            </nav>

            <div class="feed">

              <div class="feed-item">
                <div class="cover-placeholder cover-1">
                  <span style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;">
                    <span style="font-size:22px;">📱</span>
                    <span style="font-size:8px;color:#999;">手机壳</span>
                  </span>
                </div>
                <div class="feed-info">
                  <p class="feed-title">绝绝子！这个手机支架也太好用了吧</p>
                  <div class="feed-meta">
                    <div class="feed-author">
                      <div class="avatar av-orange">瓜</div>
                      <span>吃西瓜吧</span>
                    </div>
                    <div class="feed-likes"><span class="heart">♡</span><span>220</span></div>
                  </div>
                </div>
              </div>

              <div class="feed-item">
                <div class="cover-placeholder cover-2">
                  <span style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;">
                    <span style="font-size:22px;">☕</span>
                    <span style="font-size:8px;color:rgba(255,255,255,0.8);">咖啡店</span>
                  </span>
                  <div class="cover-label">GOOD THINGS ARE COMING</div>
                </div>
                <div class="feed-info">
                  <p class="feed-title">探店｜Ins风咖啡店，专门招待懂咖啡的人</p>
                  <div class="feed-meta">
                    <div class="feed-author">
                      <div class="avatar av-pink">B</div>
                      <span>Bella十三</span>
                    </div>
                    <div class="feed-likes"><span class="heart">♡</span><span>18</span></div>
                  </div>
                </div>
              </div>

              <div class="feed-item no-title">
                <div class="cover-placeholder cover-3" style="aspect-ratio:1/1.3;">
                  <span style="font-size:22px;">🏛️</span>
                </div>
                <div class="feed-info">
                  <div class="feed-author">
                    <div class="avatar av-red" style="width:16px;height:16px;font-size:8px;">红</div>
                    <span>红薯编辑器</span>
                  </div>
                  <div class="feed-likes"><span class="heart">♡</span><span>137</span></div>
                </div>
              </div>

              <div class="feed-item">
                <div class="cover-placeholder cover-4" style="aspect-ratio:1/1.3;">
                  <span style="font-size:22px;">👗</span>
                </div>
                <div class="feed-info">
                  <p class="feed-title">一眼万年的梦中情"店"</p>
                  <div class="feed-meta">
                    <div class="feed-author">
                      <div class="avatar av-gray">米</div>
                      <span>米米子</span>
                    </div>
                    <div class="feed-likes"><span class="heart">♡</span><span>487</span></div>
                  </div>
                </div>
              </div>

            </div><!-- /feed -->

            <nav class="bottom-nav">
              <div class="nav-item active"><span class="nav-icon">⌂</span><span>首页</span></div>
              <div class="nav-item"><span class="nav-icon">🛍</span><span>购物</span></div>
              <div class="nav-item"><div class="nav-plus">+</div></div>
              <div class="nav-item"><span class="nav-icon">💬</span><span>消息</span></div>
              <div class="nav-item"><span class="nav-icon">○</span><span>我</span></div>
            </nav>

          </div><!-- /discover-page -->

        </div><!-- /app-content -->
      </div><!-- /phone-screen -->
    </div><!-- /phone -->
  </div><!-- /phone-wrap -->

  <!-- 底部按钮 -->
  <div class="panel-footer">
    <button class="btn active-tab" id="btn-note" onclick="switchPage('note')">笔记页</button>
    <button class="btn" id="btn-discover" onclick="switchPage('discover')">发现页</button>
    <button class="btn btn-ghost">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
      保存预览
    </button>
  </div>

</div>

<script>
function switchPage(tab) {
  const notePage     = document.getElementById('note-page');
  const discoverPage = document.getElementById('discover-page');
  const btnNote      = document.getElementById('btn-note');
  const btnDiscover  = document.getElementById('btn-discover');

  if (tab === 'note') {
    notePage.classList.add('active');
    discoverPage.classList.remove('active');
    btnNote.classList.add('active-tab');
    btnDiscover.classList.remove('active-tab');
  } else {
    discoverPage.classList.add('active');
    notePage.classList.remove('active');
    btnDiscover.classList.add('active-tab');
    btnNote.classList.remove('active-tab');
  }
}
</script>
</body>
</html>
